<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOKYO-ESCAPE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { padding-bottom: 70px; background-color: #f8f9fa; }
    .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #343a40; z-index: 1000; }
    .nav-bottom .nav-link { color: #adb5bd; text-align: center; padding: 15px 0; cursor: pointer; }
    .nav-bottom .nav-link.active { color: #fff; font-weight: bold; border-top: 3px solid #0d6efd; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .chart-container { position: relative; height: 180px; width: 100%; }
    .loading-overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(255,255,255,0.8); z-index: 2000; 
      display: flex; justify-content: center; align-items: center; 
      display: none; font-weight: bold; font-size: 1.2rem;
    }
  </style>
</head>
<body>

  <div id="loading" class="loading-overlay">データを同期中...</div>

  <div class="container mt-4">
    <h2 class="text-center mb-4">TOKYO-ESCAPE</h2>

    <div id="tab-earn" class="tab-content active">
      <div class="card mb-4 shadow-sm">
        <div class="card-body">
          <h5 class="card-title text-center">稼働ダッシュボード</h5>
          <div class="row text-center mt-3">
            <div class="col-6">
              <h6>売上進捗 (目標700万円)</h6>
              <div class="chart-container"><canvas id="salesChart"></canvas></div>
            </div>
            <div class="col-6">
              <h6>稼働日数 (目標365日)</h6>
              <div class="chart-container"><canvas id="daysChart"></canvas></div>
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title">売上入力フォーム</h5>
          <form id="form-earn">
            <div class="mb-3">
              <label class="form-label">日付</label>
              <input type="date" class="form-control" id="earn-date" required>
            </div>
            <div class="mb-3">
              <label class="form-label">売上金額 (円)</label>
              <input type="number" class="form-control" id="earn-income" required>
            </div>
            <div class="mb-3">
              <label class="form-label">オンライン時間 (時間)</label>
              <input type="number" step="0.1" class="form-control" id="earn-online" required>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="btn-earn">記録を送信</button>
          </form>
        </div>
      </div>
    </div>

    <div id="tab-use" class="tab-content">
      <div class="card mb-4 shadow-sm">
        <div class="card-body">
          <h5 class="card-title text-center">支出ダッシュボード</h5>
          <div class="row text-center mt-3">
            <div class="col-6">
              <h6>収支バランス (直近30日)</h6>
              <div class="chart-container"><canvas id="recentChart"></canvas></div>
            </div>
            <div class="col-6">
              <h6>総収支バランス (累計)</h6>
              <div class="chart-container"><canvas id="totalChart"></canvas></div>
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow-sm">
        <div class="card-body">
          <h5 class="card-title">支出入力フォーム</h5>
          <form id="form-use">
            <div class="mb-3">
              <label class="form-label">支出名目</label>
              <input type="text" class="form-control" id="use-name" required>
            </div>
            <div class="mb-3">
              <label class="form-label">金額 (円)</label>
              <input type="number" class="form-control" id="use-price" required>
            </div>
            <button type="submit" class="btn btn-danger w-100" id="btn-use">記録を送信</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="nav-bottom d-flex">
    <div class="flex-fill nav-link active" onclick="switchTab('earn', this)">EARN</div>
    <div class="flex-fill nav-link" onclick="switchTab('use', this)">USE</div>
  </div>

  <script>
    // ▼ ここにGASのウェブアプリURLを貼り付ける ▼
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbyGG9nXSu0VKFS6mjKfjEAgZ1AfcNxg-HgeLXUrW3GFeBEnCcDRjvPov4-wZtmcdz7QKg/exec';
    
    let charts = {};

    // タブ切り替え制御
    function switchTab(tabName, element) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + tabName).classList.add('active');
      document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
      element.classList.add('active');
    }

    // チャート描画関数
    function renderPieChart(canvasId, labels, data, colors) {
      const ctx = document.getElementById(canvasId).getContext('2d');
      if (charts[canvasId]) {
        charts[canvasId].destroy(); // 既存のチャートを破棄して再描画
      }
      charts[canvasId] = new Chart(ctx, {
        type: 'pie',
        data: {
          labels: labels,
          datasets: [{ data: data, backgroundColor: colors }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
      });
    }

    // ダッシュボードデータの取得と描画
    async function fetchDashboardData() {
      document.getElementById('loading').style.display = 'flex';
      try {
        const response = await fetch(GAS_URL);
        const data = await response.json();
        
        // Earn Charts
        renderPieChart('salesChart', ['現在の売上', '残り'], [data.earn.totalIncome, data.earn.targetSalesRemaining], ['#0d6efd', '#e9ecef']);
        renderPieChart('daysChart', ['稼働日数', '残り'], [data.earn.totalDays, data.earn.targetDaysRemaining], ['#198754', '#e9ecef']);
        
        // Use Charts
        renderPieChart('recentChart', ['収入', '支出'], [data.use.income30d, data.use.expense30d], ['#0d6efd', '#dc3545']);
        renderPieChart('totalChart', ['総収入', '総支出'], [data.use.totalIncome, data.use.totalExpense], ['#0d6efd', '#dc3545']);
      } catch (error) {
        console.error('データ取得エラー:', error);
      } finally {
        document.getElementById('loading').style.display = 'none';
      }
    }

    // データ送信処理 (CORS回避のため text/plain を使用)
    async function submitData(payload, btnElement) {
      btnElement.disabled = true;
      const originalText = btnElement.innerText;
      btnElement.innerText = '送信処理中...';

      try {
        await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload)
        });
        
        // 送信成功時、データを再取得してフォームをリセット
        await fetchDashboardData();
        return true;
      } catch (error) {
        alert('送信に失敗しました。');
        return false;
      } finally {
        btnElement.innerText = originalText;
        btnElement.disabled = false;
      }
    }

    // Earnフォーム送信イベント
    document.getElementById('form-earn').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        type: 'earn',
        date: document.getElementById('earn-date').value,
        income: document.getElementById('earn-income').value,
        online: document.getElementById('earn-online').value
      };
      
      const success = await submitData(payload, document.getElementById('btn-earn'));
      if (success) {
        document.getElementById('form-earn').reset();
        // 自動的にearnタブのまま（何もしなくてよい）
      }
    });

    // Useフォーム送信イベント
    document.getElementById('form-use').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        type: 'use',
        name: document.getElementById('use-name').value,
        price: document.getElementById('use-price').value
      };
      
      const success = await submitData(payload, document.getElementById('btn-use'));
      if (success) {
        document.getElementById('form-use').reset();
        // 自動的にuseタブのまま（何もしなくてよい）
      }
    });

    // 初期読み込み時に本日の日付をセットし、データを取得
    window.onload = () => {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('earn-date').value = today;
      fetchDashboardData();
    };
  </script>
</body>
</html>
