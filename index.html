<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOKYO-ESCAPE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <style>
    body { padding-bottom: 70px; background-color: #f8f9fa; }
    .nav-bottom { position: fixed; bottom: 0; width: 100%; background: #343a40; z-index: 1000; }
    .nav-bottom .nav-link { color: #adb5bd; text-align: center; padding: 15px 0; border-radius: 0; }
    .nav-bottom .nav-link.active { color: #fff; background-color: #495057; font-weight: bold; }
    .chart-container { position: relative; width: 100%; height: 120px; /* 縦幅を固定して無駄な余白をカット */ }
    .chart-container canvas { width: 100% !important; height: 100% !important; }
    .stat-text { font-size: 0.9rem; font-weight: bold; text-align: center; margin-top: 10px; /* マイナスマージンで上に詰める */ }
    .section-title { font-size: 1.2rem; font-weight: bold; margin: 20px 0 10px; border-bottom: 2px solid #dee2e6; padding-bottom: 5px; }
  </style>
</head>
<body>

  <header class="bg-dark text-white text-center py-3">
    <h1 class="m-0 h4">TOKYO-ESCAPE</h1>
  </header>

  <div class="container mt-3" id="app-container">
    <div id="earn-section">
      <h2 class="section-title">Dashboard</h2>
      <div class="row">
        <div class="col-6">
          <div class="chart-container"><canvas id="earn-money-chart"></canvas></div>
          <div class="stat-text text-success" id="earn-money-text">-- / 7,000,000 JPY</div>
        </div>
        <div class="col-6">
          <div class="chart-container"><canvas id="earn-days-chart"></canvas></div>
          <div class="stat-text text-primary" id="earn-days-text">-- / 365 Days</div>
        </div>
      </div>

      <h2 class="section-title">Input Form</h2>
      <form id="earn-form">
        <div class="mb-3">
          <label class="form-label">Date</label>
          <input type="date" class="form-control" id="earn-date" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Income (JPY)</label>
          <input type="number" class="form-control" id="earn-income" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Online Hours</label>
          <input type="number" step="0.1" class="form-control" id="earn-online" required>
        </div>
        <button type="submit" class="btn btn-success w-100" id="earn-submit">Submit Earn Data</button>
      </form>
    </div>

    <div id="use-section" class="d-none">
      <h2 class="section-title">Dashboard</h2>
      <div class="row">
        <div class="col-6">
          <div class="chart-container"><canvas id="use-30days-chart"></canvas></div>
          <div class="stat-text text-warning" id="use-30days-text">30D In/Out</div>
        </div>
        <div class="col-6">
          <div class="chart-container"><canvas id="use-total-chart"></canvas></div>
          <div class="stat-text text-danger" id="use-total-text">Total In/Out</div>
        </div>
      </div>

      <h2 class="section-title">Input Form</h2>
      <form id="use-form">
        <div class="mb-3">
          <label class="form-label">Name / Description</label>
          <input type="text" class="form-control" id="use-name" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Price (JPY)</label>
          <input type="number" class="form-control" id="use-price" required>
        </div>
        <button type="submit" class="btn btn-danger w-100" id="use-submit">Submit Use Data</button>
      </form>
    </div>
  </div>

  <nav class="nav-bottom d-flex pb-2">
    <a href="#" class="nav-link flex-fill active" id="tab-earn">EARN</a>
    <a href="#" class="nav-link flex-fill" id="tab-use">USE</a>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="app.js"></script>
</body>
</html>
